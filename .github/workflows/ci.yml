# ============================================================
# CI Pipeline — Run on every push/PR to main
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Install, lint, validate ────────────────────
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mysql@123
          MYSQL_DATABASE: rule_engine_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pmysql@123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Start server and health check
        working-directory: backend
        env:
          PORT: 5000
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/rule-engine-test
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 7d
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: mysql@123
          DB_NAME: rule_engine_db
        run: |
          node server.js &
          SERVER_PID=$!
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "✅ Server is healthy!"
              curl -s http://localhost:5000/api/health | cat
              kill $SERVER_PID
              exit 0
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done
          echo "❌ Server failed to start"
          kill $SERVER_PID 2>/dev/null
          exit 1

  # ── Frontend: Install, lint, build ──────────────────────
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Docker: Validate both images build ──────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: rule-engine-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: rule-engine-frontend:ci
