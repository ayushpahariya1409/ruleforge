# ============================================================
# CD Pipeline — Build, Push & Deploy to AWS EC2
# ============================================================
# Prerequisites:
#   Set these secrets in your GitHub repo:
#   - DOCKERHUB_USERNAME
#   - DOCKERHUB_TOKEN
#   - EC2_HOST          (Public IP of EC2)
#   - EC2_USER          (usually 'ubuntu')
#   - EC2_SSH_KEY       (Private Key content)
# ============================================================
name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Wait for CI to pass before deploying ──────────────────
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: CI gate placeholder
        run: echo "CI checks passed, proceeding to deploy..."

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rule-engine-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rule-engine-backend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rule-engine-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rule-engine-frontend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/rule-forge

            # Export DOCKERHUB_USERNAME so docker-compose.prod.yml can resolve it
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            # Pull latest images and restart using the production compose file
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old/dangling images
            docker image prune -f

            # Verify containers are running
            echo ""
            echo "=== Container Status ==="
            docker compose -f docker-compose.prod.yml ps
