# Docker Compose — Production (EC2 Deployment)
# Pulls pre-built images from Docker Hub
# DOCKERHUB_USERNAME must be set as an environment variable

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/rule-engine-backend:latest
    container_name: rule-engine-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    image: ${DOCKERHUB_USERNAME}/rule-engine-frontend:latest
    container_name: rule-engine-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
